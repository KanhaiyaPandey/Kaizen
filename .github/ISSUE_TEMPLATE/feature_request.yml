name: Feature request
description: Propose a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired outcome and scope.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, benchmarks, or examples.
